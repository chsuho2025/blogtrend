<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 트렌드 레이더</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --green: #03C75A;
      --green-light: #e8f9f0;
      --green-mid: #b3efd1;
      --red: #F04452;
      --red-light: #fff0f1;
      --blue: #1A73E8;
      --bg: #F7F8FA;
      --white: #ffffff;
      --border: #E5E8ED;
      --border-light: #F0F2F5;
      --text: #191F28;
      --text-sub: #4E5968;
      --text-muted: #8B95A1;
      --text-placeholder: #B0B8C1;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--green);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-beta {
      font-size: 10px;
      font-weight: 700;
      color: var(--green);
      background: var(--green-light);
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .update-info {
      font-size: 12px;
      color: var(--text-muted);
    }

    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .refresh-btn {
      height: 34px;
      padding: 0 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .refresh-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-light);
    }

    .refresh-btn.loading {
      opacity: 0.5;
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .spin { animation: spin 0.8s linear infinite; display: inline-block; }

    /* TICKER BAR */
    .ticker-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border-light);
      padding: 0 24px;
    }

    .ticker-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .ticker-inner::-webkit-scrollbar { display: none; }

    .ticker-item {
      padding: 10px 24px 10px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      border-right: 1px solid var(--border-light);
      margin-right: 24px;
      font-size: 13px;
    }

    .ticker-item:last-child { border-right: none; }

    .ticker-label {
      color: var(--text-muted);
      font-size: 12px;
    }

    .ticker-val {
      font-weight: 700;
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
    }

    .up { color: var(--red); }
    .down { color: var(--blue); }
    .flat-color { color: var(--text-muted); }

    /* MAIN */
    .main-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
    }

    /* CARD */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .period-tabs {
      display: flex;
      gap: 2px;
    }

    .period-tab {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      background: none;
      border: none;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.15s;
    }

    .period-tab:hover { background: var(--bg); color: var(--text); }
    .period-tab.active { background: var(--green); color: #fff; font-weight: 700; }

    /* CHART */
    .chart-wrap {
      padding: 20px;
      height: 200px;
    }

    /* TABLE */
    .rank-table {
      width: 100%;
    }

    .rank-table-header {
      display: grid;
      grid-template-columns: 48px 1fr 100px 80px 64px;
      padding: 8px 20px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border-light);
      letter-spacing: 0.3px;
    }

    .rank-table-header span:not(:first-child) { text-align: right; }

    .rank-row {
      display: grid;
      grid-template-columns: 48px 1fr 100px 80px 64px;
      padding: 11px 20px;
      align-items: center;
      transition: background 0.1s;
      cursor: pointer;
    }

    .rank-row.highlight { background: #FFFEF0; }

    .rank-num {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: 'Roboto Mono', monospace;
    }

    .rank-num.gold { color: #F5A623; }
    .rank-num.silver { color: #8B95A1; }
    .rank-num.bronze { color: #CD7F32; }

    .rank-keyword {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .color-bar {
      width: 3px;
      height: 28px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .keyword-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .keyword-comment {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-score {
      text-align: right;
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .rank-change {
      text-align: right;
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      font-weight: 600;
    }

    .rank-bar-cell {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .rank-bar-outer {
      width: 48px;
      height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      overflow: hidden;
    }

    .rank-bar-inner {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 1.2s ease;
    }

    /* HOT BADGE */
    .hot-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      color: var(--red);
      background: var(--red-light);
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    /* TREND BADGES */
    .trend-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .trend-badge.yebo {
      color: #7C3AED;
      background: #F3EEFF;
    }
    .trend-badge.yujung {
      color: #03C75A;
      background: #E8F9F0;
    }
    .trend-badge.yuji {
      color: #8B95A1;
      background: #F0F2F5;
    }
    .rank-row.yebo-row { background: #FDFBFF; }

    /* POSTS PANEL */
    .rank-item-wrap {
      border-bottom: 1px solid var(--border-light);
    }
    .rank-item-wrap:last-child { border-bottom: none; }

    .rank-row {
      cursor: pointer;
    }
    .rank-row:hover { background: #F7F8FA; }
    .rank-row.active { background: #F0FDF6; }

    .posts-panel {
      display: none;
      flex-direction: column;
      gap: 0;
      background: #FAFBFC;
      border-top: 1px solid var(--border-light);
    }
    .posts-panel.open { display: flex; }

    .post-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 12px 20px 12px 60px;
      border-bottom: 1px solid var(--border-light);
      text-decoration: none;
      transition: background 0.1s;
    }
    .post-item:last-child { border-bottom: none; }
    .post-item:hover { background: #F0FDF6; }

    .post-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-meta {
      font-size: 11px;
      color: var(--text-placeholder);
      margin-top: 1px;
    }
    .posts-loading {
      padding: 14px 20px 14px 60px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .chart-wrap {
      padding: 24px 20px 16px;
      height: 240px;
    }
    .period-tabs button { cursor: pointer; }

    /* SIDEBAR */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* TOP5 SIDEBAR CARD */
    .top5-list {
      padding: 4px 0;
    }

    .top5-item {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      gap: 12px;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.1s;
    }

    .top5-item:last-child { border-bottom: none; }
    .top5-item:hover { background: #FAFBFC; }

    .top5-rank {
      font-size: 18px;
      font-weight: 900;
      color: var(--green);
      width: 24px;
      text-align: center;
      font-family: 'Roboto Mono', monospace;
      flex-shrink: 0;
    }

    .top5-info { flex: 1; min-width: 0; }

    .top5-keyword {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .top5-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .top5-change {
      font-size: 13px;
      font-weight: 700;
      font-family: 'Roboto Mono', monospace;
      flex-shrink: 0;
    }

    /* INFO CARD */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border-light);
    }

    .info-cell {
      background: var(--white);
      padding: 16px;
    }

    .info-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .info-val {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
      letter-spacing: -0.5px;
    }

    .info-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* LOADING / ERROR */
    .state-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 12px;
      color: var(--text-muted);
    }

    .loading-ring {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .state-text { font-size: 13px; color: var(--text-muted); }

    /* FOOTER */
    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left { font-size: 12px; color: var(--text-muted); }

    .footer-tags { display: flex; gap: 6px; }

    .footer-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--white);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
    }

    @media (max-width: 900px) {
      .main-wrap { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .rank-table-header,
      .rank-row { grid-template-columns: 40px 1fr 80px 72px; }
      .rank-table-header span:last-child,
      .rank-bar-cell { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">📡</div>
      <span class="logo-name">블로그 트렌드 레이더</span>
      <span class="logo-beta">BETA</span>
    </div>
    <div class="header-right">
      <span class="update-info">
        <span class="live-dot"></span>
        <span id="updateTime">데이터 로딩 중</span>
      </span>
      <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
        <span id="refreshIcon">↻</span> 새로고침
      </button>
    </div>
  </div>
</header>

<div class="ticker-bar">
  <div class="ticker-inner" id="tickerBar">
    <div class="ticker-item">
      <span class="ticker-label">블로그 트렌드</span>
      <span class="ticker-val" id="tick-top1">—</span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">급상승</span>
      <span class="ticker-val up" id="tick-rate">—</span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">분석 키워드</span>
      <span class="ticker-val" id="tick-count">—</span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">업데이트</span>
      <span class="ticker-val" id="tick-time">—</span>
    </div>
  </div>
</div>

<div class="main-wrap">
  <!-- LEFT: MAIN CONTENT -->
  <div id="mainContent">
    <div class="state-wrap">
      <div class="loading-ring"></div>
      <div class="state-text">트렌드 데이터 불러오는 중...</div>
    </div>
  </div>

  <!-- RIGHT: SIDEBAR -->
  <div class="sidebar" id="sidebar" style="display:none;">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">TOP 5</div>
          <div class="card-sub">실시간 인기 키워드</div>
        </div>
      </div>
      <div class="top5-list" id="top5List"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">🔥 급상승</div>
          <div class="card-sub">최근 3일 급상승 키워드</div>
        </div>
      </div>
      <div id="risingList" style="padding:8px 0;"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">현황</div>
      </div>
      <div class="info-grid">
        <div class="info-cell">
          <div class="info-label">분석 키워드</div>
          <div class="info-val" id="stat-count">—</div>
          <div class="info-sub">개</div>
        </div>
        <div class="info-cell">
          <div class="info-label">최고 상승률</div>
          <div class="info-val up" id="stat-rate">—</div>
          <div class="info-sub">%</div>
        </div>
        <div class="info-cell">
          <div class="info-label">1위 키워드</div>
          <div class="info-val" id="stat-top" style="font-size:14px;">—</div>
          <div class="info-sub">현재 1위</div>
        </div>
        <div class="info-cell">
          <div class="info-label">데이터 갱신</div>
          <div class="info-val" style="font-size:13px;" id="stat-time">—</div>
          <div class="info-sub">마지막 업데이트</div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-left">Powered by Naver Blog Search · DataLab · HyperCLOVA X</div>
  <div class="footer-tags">
    <span class="footer-tag">NAVER API</span>
    <span class="footer-tag">HyperCLOVA X</span>
    <span class="footer-tag">Vercel</span>
  </div>
</footer>

<script>
const CHART_COLORS = ['#03C75A','#1A73E8','#F5A623','#F04452','#9B59B6'];
let chartInstance = null;

async function loadData() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error('no data');
    const data = await res.json();
    renderAll(data);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-wrap"><div class="state-text">데이터를 불러오지 못했습니다.</div></div>`;
  }
}

async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.classList.add('loading');
  icon.classList.add('spin');
  try {
    await fetch('/api/refresh');
    await loadData();
  } catch(e) {
    alert('새로고침 실패');
  } finally {
    btn.classList.remove('loading');
    icon.classList.remove('spin');
  }
}

function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function fmtShort(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function changeText(rate) {
  if (rate >= 100) return `<span class="up" style="font-weight:800;">🔥+${rate}%</span>`;
  if (rate > 0) return `<span class="up">▲+${rate}%</span>`;
  if (rate < -5) return `<span class="down">▼${Math.abs(rate)}%</span>`;
  return `<span class="flat-color">보합</span>`;
}

function renderAll(data) {
  const kws = data.keywords;
  const top5 = kws.slice(0, 5);
  const maxScore = kws[0]?.score || 100;
  const maxRate = Math.max(...kws.map(k => k.changeRate));

  // Header
  document.getElementById('updateTime').textContent = fmt(data.updatedAt) + ' 업데이트';

  // Ticker
  document.getElementById('tick-top1').textContent = kws[0]?.keyword || '—';
  document.getElementById('tick-rate').textContent = maxRate > 0 ? `+${maxRate}%` : '—';
  document.getElementById('tick-count').textContent = kws.length + '개';
  document.getElementById('tick-time').textContent = fmtShort(data.updatedAt);

  // Sidebar stats
  document.getElementById('stat-count').textContent = kws.length;
  document.getElementById('stat-rate').textContent = maxRate;
  document.getElementById('stat-top').textContent = kws[0]?.keyword || '—';
  document.getElementById('stat-time').textContent = fmtShort(data.updatedAt);

  // Top5 sidebar
  document.getElementById('top5List').innerHTML = top5.map((kw, i) => `
    <div class="top5-item">
      <div class="top5-rank">${kw.rank}</div>
      <div class="top5-info">
        <div class="top5-keyword">${kw.keyword}</div>
        <div class="top5-meta">${kw.comment || '트렌딩 키워드'}</div>
      </div>
      <div class="top5-change" style="color:${CHART_COLORS[i]}">${kw.changeRate > 0 ? '+' : ''}${kw.changeRate}%</div>
    </div>
  `).join('');

  // Rising list
  const rising = data.rising || [];
  document.getElementById('risingList').innerHTML = rising.slice(0, 5).map((kw, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 20px;border-bottom:1px solid var(--border-light);">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:11px;font-weight:700;color:var(--text-muted);min-width:16px;">${i+1}</span>
        <span style="font-size:13px;font-weight:600;color:var(--text);">${kw.keyword}</span>
      </div>
      <span style="font-size:12px;font-weight:700;color:var(--red);">▲${kw.risingRate}%</span>
    </div>
  `).join('') || '<div style="padding:16px 20px;color:var(--text-muted);font-size:13px;">데이터 없음</div>';

  document.getElementById('sidebar').style.display = 'flex';

  // Main content
  document.getElementById('mainContent').innerHTML = `
    <div style="display:flex; flex-direction:column; gap:16px;">
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">트렌드 차트</div>
            <div class="card-sub">TOP 5 키워드 상대적 검색량 변화 (각 키워드 기준 정규화)</div>
          </div>
          <div class="period-tabs">
            <button class="period-tab active">1주</button>
            <button class="period-tab">2주</button>
            <button class="period-tab">4주</button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">실시간 랭킹</div>
            <div class="card-sub">네이버 블로그 트렌드 TOP 20</div>
          </div>
        </div>
        <div class="rank-table-header">
          <span>순위</span>
          <span>키워드</span>
          <span style="text-align:right">주간 변화율</span>
          <span style="text-align:right">포스팅 수</span>
          <span style="text-align:right">비중</span>
        </div>
        <div id="rankList"></div>
      </div>
    </div>
  `;

  // Render rank list
  const logMax = Math.log10(Math.max(...kws.map(k => k.postCount), 10));
  document.getElementById('rankList').innerHTML = kws.map((kw, i) => {
    const isTop5 = kw.rank <= 5;
    const colorIdx = Math.min(i, CHART_COLORS.length - 1);
    const logPost = kw.postCount > 0 ? Math.log10(kw.postCount) : 0;
    const scoreW = Math.round((logPost / logMax) * 100);
    const numClass = kw.rank === 1 ? 'gold' : kw.rank === 2 ? 'silver' : kw.rank === 3 ? 'bronze' : '';
    const trendBadge = kw.trend === '유행예감'
      ? '<span class="trend-badge yebo">🔮 유행예감</span>'
      : kw.trend === '유행중'
      ? '<span class="trend-badge yujung">🔥 유행중</span>'
      : '<span class="trend-badge yuji">📉 유행지남</span>';
    const rowClass = kw.trend === '유행예감' ? 'yebo-row' : '';

    return `
      <div class="rank-item-wrap">
        <div class="rank-row ${rowClass}" onclick="togglePosts(this, '${kw.keyword.replace(/'/g, "\'")}')">
          <div class="rank-num ${numClass}">${kw.rank}</div>
          <div class="rank-keyword">
            ${isTop5 ? `<div class="color-bar" style="background:${CHART_COLORS[colorIdx]}"></div>` : '<div style="width:3px"></div>'}
            <div style="min-width:0">
              <div style="display:flex;align-items:center;gap:6px">
                <span class="keyword-name">${kw.keyword}</span>
                ${trendBadge}
              </div>
              ${kw.comment ? `<div class="keyword-comment">${kw.comment}</div>` : ''}
            </div>
          </div>
          <div class="rank-score">${changeText(kw.changeRate)}</div>
          <div class="rank-change" style="font-size:12px;color:var(--text-muted);">${kw.postCount > 0 ? kw.postCount.toLocaleString() : '-'}</div>
          <div class="rank-bar-cell">
            <div class="rank-bar-outer">
              <div class="rank-bar-inner" style="width:${scoreW}%"></div>
            </div>
          </div>
        </div>
        <div class="posts-panel" id="posts-${i}">
          <div class="posts-loading">불러오는 중...</div>
        </div>
      </div>
    `;
  }).join('');

  drawChart(top5, 7);
  setupPeriodTabs(top5);
}

let currentOpenIdx = null;

async function togglePosts(row, keyword) {
  const wrap = row.parentElement;
  const panel = wrap.querySelector('.posts-panel');
  const isOpen = panel.classList.contains('open');

  // 열려있는 패널 닫기
  document.querySelectorAll('.posts-panel.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.rank-row.active').forEach(r => r.classList.remove('active'));

  if (isOpen) return;

  panel.classList.add('open');
  row.classList.add('active');

  // 이미 로딩된 경우 스킵
  if (panel.dataset.loaded) return;

  try {
    const res = await fetch('/api/posts?keyword=' + encodeURIComponent(keyword));
    const data = await res.json();
    const posts = data.posts || [];
    if (!posts.length) {
      panel.innerHTML = '<div class="posts-loading">관련 게시글이 없습니다.</div>';
    } else {
      panel.innerHTML = posts.map(p => `
        <a class="post-item" href="${p.link}" target="_blank" rel="noopener">
          <div class="post-title">${p.title}</div>
          <div class="post-desc">${p.description}</div>
          <div class="post-meta">${p.bloggerName} · ${p.postdate.slice(0,4)}.${p.postdate.slice(4,6)}.${p.postdate.slice(6,8)}</div>
        </a>
      `).join('');
    }
    panel.dataset.loaded = '1';
  } catch(e) {
    panel.innerHTML = '<div class="posts-loading">불러오기 실패</div>';
  }
}

function setupPeriodTabs(top5) {
  const tabs = document.querySelectorAll('.period-tab');
  const periods = [7, 14, 28];
  tabs.forEach((tab, i) => {
    tab.onclick = () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      drawChart(top5, periods[i]);
    };
  });
}

function drawChart(top5, days = 7) {
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('trendChart').getContext('2d');
  const labels = Array.from({length: days}, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (days - 1 - i));
    return `${d.getMonth()+1}/${d.getDate()}`;
  });

  const datasets = top5.map((kw, i) => {
    const allVals = kw.values || [];
    // 있는 데이터만 사용, 부족하면 앞을 0으로 패딩
    const raw = allVals.length >= days
      ? allVals.slice(-days)
      : [...Array.from({length: days - allVals.length}, () => 0), ...allVals];
    // 각 키워드를 0~100으로 정규화
    const maxVal = Math.max(...raw, 1);
    const minVal = Math.min(...raw);
    const range = maxVal - minVal || 1;
    const points = raw.map(v => Math.round(((v - minVal) / range) * 100));
    return {
      label: kw.keyword,
      data: points,
      borderColor: CHART_COLORS[i],
      backgroundColor: CHART_COLORS[i] + '18',
      borderWidth: 2,
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.4,
      fill: false,
    };
  });

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#8B95A1',
            font: { size: 11, family: 'Noto Sans KR' },
            boxWidth: 10,
            padding: 14,
          }
        },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#E5E8ED',
          borderWidth: 1,
          titleColor: '#191F28',
          bodyColor: '#4E5968',
          titleFont: { family: 'Noto Sans KR', size: 12, weight: '700' },
          bodyFont: { family: 'Roboto Mono', size: 11 },
          padding: 10,
          boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
        }
      },
      scales: {
        x: {
          grid: { color: '#F0F2F5' },
          ticks: { color: '#B0B8C1', font: { size: 11, family: 'Roboto Mono' } },
          border: { color: '#E5E8ED' },
        },
        y: {
          min: 0,
          max: 100,
          grid: { color: '#F0F2F5' },
          ticks: { color: '#B0B8C1', font: { size: 11, family: 'Roboto Mono' }, callback: v => v + '%' },
          border: { color: '#E5E8ED' },
        }
      }
    }
  });
}

loadData();
</script>
